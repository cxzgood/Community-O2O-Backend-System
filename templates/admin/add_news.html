<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新通知 - 后台管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">幸福社区 - 后台管理</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">返回首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">查看通知</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header">
                        <h3 class="mb-0">发布新通知</h3>
                    </div>
                    <div class="card-body">
                        <form action="/admin/submit_news" method="post">
                            <div class="mb-3">
                                <label for="titleInput" class="form-label">通知标题</label>
                                <input type="text" name="title" class="form-control" id="titleInput" required>
                            </div>
                            <div class="mb-3">
                                <label for="contentInput" class="form-label">通知内容</label>
                                <textarea name="content" class="form-control" id="contentInput" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">确认发布</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 bg-light py-4 text-center">
        <div class="container">
            <p class="mb-0">© 2025 XX社区服务中心. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
