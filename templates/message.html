<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线留言 - 幸福社区服务中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .message-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .message-card:hover { transform: translateY(-2px); }
        .message-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 1.5rem;
        }
        .message-item { border-left: 4px solid #667eea; }
        .message-time { color: #6c757d; font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-house-heart"></i> 幸福社区</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">通知公告</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/message">在线留言</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container py-5">
        <h2 class="mb-4 text-center"><i class="bi bi-chat-left-text"></i> 在线留言板</h2>

        <!-- 留言表单 -->
        <div class="message-card mb-5">
            <div class="message-header">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> 我要留言</h4>
            </div>
            <div class="card-body p-4">
                <form action="/submit_message" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">您的姓名</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">留言内容</label>
                        <textarea class="form-control" id="content" name="content" rows="4" placeholder="请输入留言内容" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> 提交留言</button>
                </form>
            </div>
        </div>

        <!-- 留言列表 -->
        <h4 class="mb-3"><i class="bi bi-list-ul"></i> 留言列表 ({{ messages|length }} 条)</h4>

        {% if messages %}
            {% for msg in messages %}
            <div class="card message-item mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-person-circle text-primary"></i> {{ msg.name }}
                        </h5>
                        <small class="message-time">
                            <i class="bi bi-clock"></i> {{ msg.time }}
                        </small>
                    </div>
                    <p class="card-text text-dark">{{ msg.content }}</p>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-info text-center">
                <i class="bi bi-inbox"></i> 暂无留言，来说点什么吧！
            </div>
        {% endif %}
    </div>

    <!-- 页脚 -->
    <footer class="bg-light text-center py-4 mt-5">
        <div class="container">
            <p class="text-muted mb-0">© 2026 幸福社区服务中心</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
