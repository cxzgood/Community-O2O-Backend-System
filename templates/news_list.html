<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知公告 - 社区服务中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">幸福社区</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/news">通知公告</a></li>
                    <li class="nav-item"><a class="nav-link" href="/message">在线留言</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4">通知公告</h1>

        {% for item in news %}
        <div class="card mb-4 shadow">
            <div class="card-body">
                <h5 class="card-title">{{ item.title }}</h5>
                <p class="card-text mt-3">{{ item.content }}</p>
                <p class="card-text mt-4"><small class="text-muted">发布于：{{ item.time }}</small></p>
            </div>
        </div>
        {% else %}
            <div class="alert alert-info" role="alert">
                目前还没有任何通知。
            </div>
        {% endfor %}
    </div>
    
    <footer class="mt-5 bg-light py-4 text-center">
        <div class="container">
            <p class="mb-0">© 2025 幸福社区服务中心. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
